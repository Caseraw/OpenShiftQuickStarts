apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-openshift
  namespace: hello-openshift
  labels:
    app.kubernetes.io/name: hello-openshift
    app.kubernetes.io/part-of: openshift-quickstarts
  annotations:
    # Automatically update the container image when the ImageStream receives
    # a new tag from a completed Build.
    image.openshift.io/triggers: >-
      [{"from":{"kind":"ImageStreamTag","name":"hello-openshift:latest","namespace":"hello-openshift"},"fieldPath":"spec.template.spec.containers[?(@.name==\"hello-openshift\")].image"}]
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-openshift
  template:
    metadata:
      labels:
        app: hello-openshift
        app.kubernetes.io/name: hello-openshift
    spec:
      containers:
        - name: hello-openshift
          # Placeholder — replaced automatically by the ImageStream trigger
          # once the first Build completes.
          image: image-registry.openshift-image-registry.svc:5000/hello-openshift/hello-openshift:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
