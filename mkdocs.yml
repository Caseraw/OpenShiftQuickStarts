site_name: OpenShift Quick Starts
site_description: >-
  Workshop guide for Red Hat OpenShift Quick Starts — guided, in-console
  tutorials that walk participants through key platform capabilities.
site_url: https://caseraw.github.io/OpenShiftQuickStarts/
repo_url: https://github.com/Caseraw/OpenShiftQuickStarts
repo_name: Caseraw/OpenShiftQuickStarts
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: red
      accent: deep-orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: red
      accent: deep-orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Red Hat Display
    code: Red Hat Mono
  logo: material/rocket-launch
  favicon: material/rocket-launch
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.integrate

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - def_list

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Scenarios:
    - scenarios/index.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Caseraw/OpenShiftQuickStarts
      name: OpenShiftQuickStarts on GitHub

copyright: >-
  Licensed under the
  <a href="https://github.com/Caseraw/OpenShiftQuickStarts/blob/main/LICENSE">GNU General Public License v3.0</a>
