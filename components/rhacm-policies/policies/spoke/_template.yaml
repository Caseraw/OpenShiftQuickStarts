# spoke/_template.yaml — Template for policies that target ONLY spoke clusters.
# Copy this file, remove the leading underscore, and fill in every <placeholder>.
#
#   cp policies/spoke/_template.yaml policies/spoke/<category>-<description>.yaml
#
# Namespace: acm-default-spoke-policies
# Placement: excludes the hub (local-cluster != true), selecting only imported spokes.

# ─── 1. Policy ───────────────────────────────────────────────────────────────
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: <policy-name>
  namespace: acm-default-spoke-policies
  labels:
    app.kubernetes.io/part-of: openshift-quickstarts
    app.kubernetes.io/managed-by: openshift-quickstarts
    app.kubernetes.io/component: rhacm-policies
    rhacm-policies/scope: spoke
  annotations:
    policy.open-cluster-management.io/standards: <e.g. NIST SP 800-53>
    policy.open-cluster-management.io/categories: <e.g. CM Configuration Management>
    policy.open-cluster-management.io/controls: <e.g. CM-2 Baseline Configuration>
spec:
  disabled: false
  remediationAction: inform   # inform | enforce
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: <policy-name>-config
        spec:
          remediationAction: inform
          severity: medium
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Namespace
                metadata:
                  name: <target-namespace>

---
# ─── 2. Placement — spoke clusters only ──────────────────────────────────────
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: <policy-name>-placement
  namespace: acm-default-spoke-policies
  labels:
    app.kubernetes.io/part-of: openshift-quickstarts
    app.kubernetes.io/managed-by: openshift-quickstarts
    app.kubernetes.io/component: rhacm-policies
spec:
  # Exclude the hub by requiring local-cluster to NOT be "true".
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: local-cluster
              operator: NotIn
              values:
                - "true"

---
# ─── 3. PlacementBinding ──────────────────────────────────────────────────────
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: <policy-name>-binding
  namespace: acm-default-spoke-policies
  labels:
    app.kubernetes.io/part-of: openshift-quickstarts
    app.kubernetes.io/managed-by: openshift-quickstarts
    app.kubernetes.io/component: rhacm-policies
placementRef:
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
  name: <policy-name>-placement
subjects:
  - apiGroup: policy.open-cluster-management.io
    kind: Policy
    name: <policy-name>
