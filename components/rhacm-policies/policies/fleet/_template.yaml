# fleet/_template.yaml — Template for policies that target ALL clusters (hub + spokes).
# Copy this file, remove the leading underscore, and fill in every <placeholder>.
#
#   cp policies/fleet/_template.yaml policies/fleet/<category>-<description>.yaml
#
# Namespace: acm-default-fleet-policies
# Placement: global ManagedClusterSet, no predicates → selects every managed cluster.

# ─── 1. Policy ───────────────────────────────────────────────────────────────
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: <policy-name>
  namespace: acm-default-fleet-policies
  labels:
    app.kubernetes.io/part-of: openshift-quickstarts
    app.kubernetes.io/managed-by: openshift-quickstarts
    app.kubernetes.io/component: rhacm-policies
    rhacm-policies/scope: fleet
  annotations:
    policy.open-cluster-management.io/standards: <e.g. NIST SP 800-53>
    policy.open-cluster-management.io/categories: <e.g. CM Configuration Management>
    policy.open-cluster-management.io/controls: <e.g. CM-2 Baseline Configuration>
spec:
  disabled: false
  remediationAction: inform   # inform | enforce
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: <policy-name>-config
        spec:
          remediationAction: inform
          severity: medium   # low | medium | high | critical
          object-templates:
            - complianceType: musthave   # musthave | mustnothave | mustonlyhave
              objectDefinition:
                # Define the resource this policy expects to exist on every cluster.
                apiVersion: v1
                kind: Namespace
                metadata:
                  name: <target-namespace>

---
# ─── 2. Placement — all clusters ─────────────────────────────────────────────
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: <policy-name>-placement
  namespace: acm-default-fleet-policies
  labels:
    app.kubernetes.io/part-of: openshift-quickstarts
    app.kubernetes.io/managed-by: openshift-quickstarts
    app.kubernetes.io/component: rhacm-policies
spec:
  # Empty predicates = select ALL clusters in the bound ManagedClusterSet (global).
  predicates: []

---
# ─── 3. PlacementBinding ──────────────────────────────────────────────────────
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: <policy-name>-binding
  namespace: acm-default-fleet-policies
  labels:
    app.kubernetes.io/part-of: openshift-quickstarts
    app.kubernetes.io/managed-by: openshift-quickstarts
    app.kubernetes.io/component: rhacm-policies
placementRef:
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
  name: <policy-name>-placement
subjects:
  - apiGroup: policy.open-cluster-management.io
    kind: Policy
    name: <policy-name>
