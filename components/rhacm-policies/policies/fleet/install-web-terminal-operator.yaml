apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: install-web-terminal-operator
  namespace: acm-default-fleet-policies
  labels:
    app.kubernetes.io/part-of: openshift-quickstarts
    app.kubernetes.io/managed-by: openshift-quickstarts
    app.kubernetes.io/component: rhacm-policies
    rhacm-policies/scope: fleet
  annotations:
    policy.open-cluster-management.io/description: install-web-terminal-operator
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/controls: CM Baseline Configuration
spec:
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1beta1
        kind: OperatorPolicy
        metadata:
          name: install-web-terminal-operator
        spec:
          remediationAction: enforce
          severity: medium
          complianceType: musthave
          subscription:
            name: web-terminal
            namespace: openshift-operators
            channel: fast
            source: redhat-operators
            sourceNamespace: openshift-marketplace
          upgradeApproval: Automatic
          versions: []
          # No operatorGroup needed: openshift-operators already has an
          # AllNamespaces OperatorGroup created by OLM at cluster bootstrap.
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: install-web-terminal-operator-placement
  namespace: acm-default-fleet-policies
  labels:
    app.kubernetes.io/part-of: openshift-quickstarts
    app.kubernetes.io/managed-by: openshift-quickstarts
    app.kubernetes.io/component: rhacm-policies
spec:
  tolerations: []
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: vendor
              operator: In
              values:
                - OpenShift
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: install-web-terminal-operator-placement
  namespace: acm-default-fleet-policies
  labels:
    app.kubernetes.io/part-of: openshift-quickstarts
    app.kubernetes.io/managed-by: openshift-quickstarts
    app.kubernetes.io/component: rhacm-policies
placementRef:
  name: install-web-terminal-operator-placement
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: install-web-terminal-operator
    apiGroup: policy.open-cluster-management.io
    kind: Policy
