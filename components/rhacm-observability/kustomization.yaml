apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Phase 1 resources — applied by deploy.sh before secrets are built.
# The OBC triggers ODF to provision the bucket and write the credentials
# ConfigMap + Secret into this namespace.
# The MultiClusterObservability CR is NOT here; deploy.sh applies it
# after the thanos-object-storage and pull-secret are in place.
resources:
  - namespace.yaml
  - obc.yaml
